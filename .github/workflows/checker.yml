name: Proxy Checker

on:
  push:
    paths:
      - 'src/**/*.py'
      - 'data/**/*.py'
      - '.github/workflows/checker.yml'
      - 'requirements*'
      - 'setup*'
      - 'Taskfile*'

  workflow_dispatch:
    inputs:
      max:
        description: 'The maximum proxies to be checked.'
        required: true
        default: '100'
        type: string

  workflow_call:
    inputs:
      max:
        description: 'The maximum proxies to be checked.'
        required: true
        default: '100'
        type: string
    secrets:
      ACCESS_TOKEN:
        required: true

  schedule:
    - cron: '0 * * * *'

concurrency:
  group: proxy-checker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: contains(github.repository, 'php-proxy-hunter')

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      # Browser automation
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      # Node.js
      NODE_OPTIONS: '--max_old_space_size=4096'
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
      YARN_ENABLE_GLOBAL_CACHE: false
      YARN_CHECKSUM_BEHAVIOR: update
      YARN_CACHE_FOLDER: ${{ github.workspace }}/tmp/yarn-cache

      # Python
      PIP_LOCAL_CACHE_DIR: ${{ github.workspace }}/tmp/pip
      NUITKA_CACHE_DIR: ${{ github.workspace }}/tmp/nuitka-cache

      # GitHub auth
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: '📥 Checkout Repository'
        uses: actions/checkout@v6
        with:
          repository: dimaslanjaka/php-proxy-hunter
          ref: master
          token: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          lfs: true
          submodules: recursive
          fetch-depth: 1

      - name: '🐍 Setup Python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: '🟢 Setup Node.js'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'yarn'
          cache-dependency-path: .husky/hash.txt

      - name: '⚙️ Enable Corepack'
        run: corepack enable

      - name: '🛠️ Install Global Tools'
        run: |
          npm install -g \
            rimraf \
            binary-collections@https://raw.githubusercontent.com/dimaslanjaka/bin/master/releases/bin.tgz

      - name: '📦 Prepare Submodules'
        run: |
          git submodule update --init --recursive
          npx rimraf .git/modules
          npx submodule-install

      - name: '⬇️ Install Dependencies'
        shell: bash
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f package.json ]; then
            touch yarn.lock
            yarn install --inline-builds
          fi

          bash bin/python-minimal

      - name: '🌎 Set environment variables'
        id: set-env
        shell: bash
        run: |
          echo "${HOME}/.local/bin" >> $GITHUB_PATH
          echo "${GITHUB_WORKSPACE}/bin" >> $GITHUB_PATH
          echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> $GITHUB_PATH
          echo "GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c 1-6)" >> $GITHUB_ENV
          echo "GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c 1-6)" >> $GITHUB_OUTPUT
          echo "GITHUB_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "GITHUB_BRANCH=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          # Use runtime env vars to avoid long workflow expressions
          echo "GITHUB_COMMIT_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" >> $GITHUB_ENV
          echo "GITHUB_COMMIT_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "GITHUB_RUNNER_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}/checks/${GITHUB_RUN_ID}" >> $GITHUB_ENV
          echo "GITHUB_RUNNER_URL=https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}/checks/${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT
          echo "CACHE_NPM=$(npm config get cache)" >> $GITHUB_ENV
          echo "CACHE_NPM=$(npm config get cache)" >> $GITHUB_OUTPUT

          YARN_CURRENT=$(yarn -v)
          YARN_VERSION_MAJOR=$(echo "$YARN_CURRENT" | cut -d. -f1)
          echo "CURRENT_YARN_VERSION=$YARN_CURRENT" >> "$GITHUB_ENV"
          echo "CURRENT_YARN_VERSION=$YARN_CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$YARN_VERSION_MAJOR" -ge 2 ]; then
            # Yarn Berry (v2/v3/v4)
            CACHE_YARN=$(yarn config get cacheFolder)

          else
            # Yarn v1 (Classic)
            CACHE_YARN=$(yarn cache dir)
          fi

          echo "CACHE_YARN=$CACHE_YARN" >> "$GITHUB_ENV"
          echo "CACHE_YARN=$CACHE_YARN" >> "$GITHUB_OUTPUT"
          echo "architecture=$(getconf LONG_BIT)" >> $GITHUB_ENV
          if [ -f "package-lock.json" ]; then
              echo "PACKAGE-MANAGER=npm" >> $GITHUB_OUTPUT
              echo "PACKAGE-MANAGER=npm" >> $GITHUB_ENV
          else
              echo "PACKAGE-MANAGER=yarn" >> $GITHUB_OUTPUT
              echo "PACKAGE-MANAGER=yarn" >> $GITHUB_ENV
          fi
          unameOut="$(uname -s)"
          case "${unameOut}" in
              Linux*)     machine=linux;;
              Darwin*)    machine=mac;;
              CYGWIN*)    machine=cygwin;;
              MINGW*)     machine=mingw;;
              *)          machine="unknown:${unameOut}"
          esac
          echo "machine=$machine" >> $GITHUB_OUTPUT
          echo "machine=$machine" >> $GITHUB_ENV
          if command -v pip >/dev/null 2>&1; then
            echo "PIP_CACHE_DIR=$(pip cache dir)" >> "$GITHUB_OUTPUT"
          fi

      - name: '🗂️ Cache Project Assets'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/yarn
            ~/.npm

            .cache/
            .yarn/cache
            .yarn/install-state.gz

            vendor/
            venv/
            .venv/

            assets/proxies/
            **/*.txt
            working.json
            **/*.pem
            **/*.key
            **/*.crt

            src/*.sqlite*
            src/*.mmdb

            **/dist/**
            **/tmp/**

            ${{ env.PIP_LOCAL_CACHE_DIR }}
            ${{ env.NUITKA_CACHE_DIR }}

            ${{ steps.set-env.outputs.PIP_CACHE_DIR }}
            ${{ steps.set-env.outputs.CACHE_YARN }}
            ${{ steps.set-env.outputs.CACHE_NPM }}

          key: >
            ${{ runner.os }}-proxy-checker-
            ${{ hashFiles(
              'requirements*.txt',
              'package.json',
              'yarn.lock',
              '.husky/hash.txt',
              'setup.py',
              'setup.cfg',
              'pyproject.toml'
            ) }}

          restore-keys: |
            ${{ runner.os }}-proxy-checker-
            ${{ runner.os }}-node-
            ${{ runner.os }}-php-
            ${{ runner.os }}-python-

      - name: '▶️ Run Checker on ${{ runner.os }}'
        run: |
          bash bin/py artisan/ci-checker.py --limit="${{ github.event.inputs.max || '100' }}"

      - name: '📥 Checkout gh-pages branch'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
          token: ${{ secrets.ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: '📤 Upload working.json to gh-pages'
        shell: bash
        run: |
          if [ ! -f working.json ]; then
            echo "working.json not found"
            exit 0
          fi

          cp working.json gh-pages/working.json

          cd gh-pages

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add working.json

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Fallbacks using GitHub-provided env vars if set-env didn't export them
          GITHUB_SHA_SHORT=${GITHUB_SHA_SHORT:-${GITHUB_SHA:0:6}}
          GITHUB_BRANCH=${GITHUB_BRANCH:-${GITHUB_REF#refs/heads/}}
          GITHUB_COMMIT_URL=${GITHUB_COMMIT_URL:-"https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"}
          GITHUB_RUNNER_URL=${GITHUB_RUNNER_URL:-"https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}/checks/${GITHUB_RUN_ID}"}

          SUBJECT="feat(working): updated at ${TIMESTAMP}"

          BODY=$(printf "%s\n\nsha: %s\nbranch: %s\ncommit: %s\nrunner: %s\n" \
            "Updated working.json" "${GITHUB_SHA_SHORT}" "${GITHUB_BRANCH}" "${GITHUB_COMMIT_URL}" "${GITHUB_RUNNER_URL}")

          git commit -m "$SUBJECT" -m "$BODY"
          git push origin gh-pages
